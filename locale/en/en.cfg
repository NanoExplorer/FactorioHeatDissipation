[mod-setting-name]
HeatDissipation-kw-per-tile=Heat cost in kW per tile

[mod-setting-description]
HeatDissipation-kw-per-tile=Counts per 2 tiles of heat pipe. This is the power consumed at 500 C, everything else is scaled from this. For comparison, transport belts have heat consumption of 10kW in base Space Age, while pipes are 1kW and pipes to ground are 150 kW. From testing, even 40 kW is very manageable. 40 kW is also a slightly physics-based estimate of thermal radiation ;) At 160 kW a heating tower will struggle keeping even a moderately sized heat-pipe network above 900 C, but I couldn't measure an increase in solid fuel consumption on my base that I regulate at 150 C


